<style>
#chat-fab {
  position: fixed; bottom: 28px; right: 28px; z-index: 9999;
  width: 52px; height: 52px; border-radius: 50%;
  background: #2c3e50; color: #fff; border: none; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; transition: transform .2s, background .2s;
}
#chat-fab:hover { background: #1a252f; transform: scale(1.08); }

#chat-window {
  position: fixed; bottom: 90px; right: 28px; z-index: 9998;
  width: 340px; height: 480px;
  background: #fff; border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  display: none; flex-direction: column; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#chat-window.open { display: flex; }

#chat-header {
  background: #2c3e50; color: #fff; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
#chat-header .title { font-size: 14px; font-weight: 600; }
#chat-header .sub { font-size: 11px; opacity: .7; margin-top: 2px; }
#chat-close {
  background: none; border: none; color: #fff; cursor: pointer;
  font-size: 18px; line-height: 1; opacity: .8;
}
#chat-close:hover { opacity: 1; }

#chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  background: #f7f8fa;
}
.msg { max-width: 82%; padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
.msg.user { align-self: flex-end; background: #2c3e50; color: #fff; border-bottom-right-radius: 4px; }
.msg.bot  { align-self: flex-start; background: #fff; color: #2c3e50; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

.typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
.typing span {
  width: 7px; height: 7px; background: #aaa; border-radius: 50%;
  animation: blink 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100% { opacity:.2 } 40% { opacity:1 } }

#chat-input-area {
  padding: 10px 12px; border-top: 1px solid #eee;
  display: flex; gap: 8px; background: #fff;
}
#chat-input {
  flex: 1; border: 1px solid #dde; border-radius: 20px;
  padding: 8px 14px; font-size: 13px; outline: none;
  resize: none; font-family: inherit;
}
#chat-input:focus { border-color: #2c3e50; }
#chat-send {
  width: 36px; height: 36px; border-radius: 50%;
  background: #2c3e50; color: #fff; border: none;
  cursor: pointer; font-size: 15px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
#chat-send:hover { background: #1a252f; }
#chat-send:disabled { background: #aaa; cursor: not-allowed; }
</style>

<button id="chat-fab" title="Chat with AI">💬</button>

<div id="chat-window">
  <div id="chat-header">
    <div>
      <div class="title">AI Portfolio Assistant</div>
      <div class="sub">Ask about Xuanyu's research & projects</div>
    </div>
    <button id="chat-close">✕</button>
  </div>
  <div id="chat-messages">
    <div class="msg bot">Hi! I'm an AI assistant for Xuanyu's portfolio. Ask me anything about his research, projects, or experience 👋</div>
  </div>
  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Ask a question..." maxlength="300" />
    <button id="chat-send">➤</button>
  </div>
</div>

<script>
(function () {
  // ── config ──────────────────────────────────────────────
  const API_URL = "http://127.0.0.1:8000/chat"; // change to ngrok URL for public demo
  // ────────────────────────────────────────────────────────

  const fab     = document.getElementById("chat-fab");
  const win     = document.getElementById("chat-window");
  const msgs    = document.getElementById("chat-messages");
  const input   = document.getElementById("chat-input");
  const sendBtn = document.getElementById("chat-send");
  const closeBtn= document.getElementById("chat-close");

  fab.addEventListener("click",   () => { win.classList.toggle("open"); if (win.classList.contains("open")) input.focus(); });
  closeBtn.addEventListener("click", () => win.classList.remove("open"));

  function addMsg(text, role) {
    const d = document.createElement("div");
    d.className = "msg " + role;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }

  function showTyping() {
    const t = document.createElement("div");
    t.className = "msg bot typing";
    t.innerHTML = "<span></span><span></span><span></span>";
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
    return t;
  }

  async function send() {
    const q = input.value.trim();
    if (!q) return;
    input.value = "";
    sendBtn.disabled = true;

    addMsg(q, "user");
    const indicator = showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: q }),
      });

      indicator.remove();

      if (!res.ok) {
        addMsg("Sorry, something went wrong. Please try again.", "bot");
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      const botDiv = addMsg("", "bot");
      let full = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        full += decoder.decode(value, { stream: true });
        botDiv.textContent = full;
        msgs.scrollTop = msgs.scrollHeight;
      }
    } catch {
      indicator.remove();
      addMsg("Cannot connect to AI backend. Make sure the server is running.", "bot");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
})();
</script>
